apiVersion: v1
kind: ConfigMap
metadata:
  name: map-service-config
data:
  SUPABASE_JDBC_URL: "jdbc:postgresql://postgres:5432/postgres?currentSchema=map"
  SUPABASE_DATABASE_USER: "postgres"
  SUPABASE_DATABASE_PASSWORD: "admin"
  ALLOWED-ORIGINS: "http://a312ebdfe078b4941b8ca485894409f4-891584174.eu-central-1.elb.amazonaws.com"
  BORROW_SERVICE: "borrow-service:8030"
  SPRING_PROFILES_ACTIVE: "prod"
---
apiVersion: v1
kind: Secret
metadata:
  name: map-service-secrets
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-prod-use-min-32-chars-string"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: map-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: map-service
  template:
    metadata:
      labels:
        app: map-service
    spec:
      containers:
        - name: map-service
          image: ghcr.io/mariusss11/map-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8020
              name: http
          env:
            - name: SUPABASE_JDBC_URL
              valueFrom:
                configMapKeyRef:
                  name: map-service-config
                  key: SUPABASE_JDBC_URL
            - name: SUPABASE_DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: map-service-config
                  key: SUPABASE_DATABASE_USER
            - name: SUPABASE_DATABASE_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: map-service-config
                  key: SUPABASE_DATABASE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: map-service-secrets
                  key: JWT_SECRET
            - name: ALLOWED-ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: map-service-config
                  key: ALLOWED-ORIGINS
            - name: BORROW_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: map-service-config
                  key: BORROW_SERVICE
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: map-service-config
                  key: SPRING_PROFILES_ACTIVE
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8020
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8020
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: map-service
spec:
  selector:
    app: map-service
  ports:
    - protocol: TCP
      port: 8020
      targetPort: 8020
      name: http
