apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-service
  template:
    metadata:
      labels:
        app: client-service
    spec:
      containers:
      - name: client-service
        image: ghcr.io/mariusss11/client-service:latest
        ports:
        - containerPort: 8010
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: client-service-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: client-service-config
              key: SPRING_KAFKA_BOOTSTRAP_SERVERS
        - name: SERVER_PORT
          valueFrom:
            configMapKeyRef:
              name: client-service-config
              key: SERVER_PORT
        - name: SERVICES_BORROWSERVICE
          valueFrom:
            configMapKeyRef:
              name: client-service-config
              key: SERVICES_BORROWSERVICE
        - name: SERVICES_AUTHSERVICE
          valueFrom:
            configMapKeyRef:
              name: client-service-config
              key: SERVICES_AUTHSERVICE
        - name: SERVICES_ITEMSERVICE
          valueFrom:
            configMapKeyRef:
              name: client-service-config
              key: SERVICES_ITEMSERVICE
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: identity-service-config
              key: ALLOWED_ORIGINS
        - name: BORROW_SERVICE
          valueFrom:
            configMapKeyRef:
              name: client-service-config
              key: BORROW_SERVICE
        - name: AUTH_SERVICE
          valueFrom:
            configMapKeyRef:
              name: client-service-config
              key: AUTH_SERVICE
        - name: ITEM_SERVICE
          valueFrom:
            configMapKeyRef:
              name: client-service-config
              key: ITEM_SERVICE

---
apiVersion: v1
kind: Service
metadata:
  name: client-service
spec:
  selector:
    app: client-service
  ports:
  - protocol: TCP
    port: 8010
    targetPort: 8010
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: client-service-config
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=client
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_JPA_HIBERNATE_DDL_AUTO: validate
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-service:9092
  SPRING_FLYWAY_LOCATIONS: classpath:db/migration
  SPRING_FLYWAY_SCHEMAS: client
  SERVER_PORT: "8010"
  SERVICES_BORROWSERVICE: borrow-service.default.svc.cluster.local
  SERVICES_AUTHSERVICE: auth-service.default.svc.cluster.local
  SERVICES_ITEMSERVICE: item-service.default.svc.cluster.local
  # ALLOWED_ORIGINS: "*"
  ALLOWED_ORIGINS: "http://a312ebdfe078b4941b8ca485894409f4-891584174.eu-central-1.elb.amazonaws.com"
  BORROW_SERVICE: borrow-service
  AUTH_SERVICE: identity-service
  ITEM_SERVICE: item-service

---
apiVersion: v1
kind: Secret
metadata:
  name: client-service-secret
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: admin
