apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: library-cluster-dev
  region: eu-central-1

managedNodeGroups:
  - name: backend-services
    instanceType: t3.medium
    desiredCapacity: 3
    minSize: 0
    maxSize: 10
    volumeSize: 30
    iam:
      withAddonPolicies:
        autoScaler: true
        cloudWatch: true
