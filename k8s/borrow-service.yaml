apiVersion: v1
kind: ConfigMap
metadata:
  name: borrow-service-config
data:
  SUPABASE_JDBC_URL: "jdbc:postgresql://postgres:5432/postgres?currentSchema=borrow"
  SUPABASE_DATABASE_USER: "postgres"
  SUPABASE_DATABASE_PASSWORD: "admin"
  ALLOWED-ORIGINS: "http://a312ebdfe078b4941b8ca485894409f4-891584174.eu-central-1.elb.amazonaws.com"
  IDENTITY_SERVICE: "identity-service:8010"
  MAP_SERVICE: "map-service:8020"
  SPRING_PROFILES_ACTIVE: "prod"
---
apiVersion: v1
kind: Secret
metadata:
  name: borrow-service-secrets
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-prod-use-min-32-chars-string"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: borrow-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: borrow-service
  template:
    metadata:
      labels:
        app: borrow-service
    spec:
      containers:
        - name: borrow-service
          image: ghcr.io/mariusss11/borrow-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8030
              name: http
          env:
            - name: SUPABASE_JDBC_URL
              valueFrom:
                configMapKeyRef:
                  name: borrow-service-config
                  key: SUPABASE_JDBC_URL
            - name: SUPABASE_DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: borrow-service-config
                  key: SUPABASE_DATABASE_USER
            - name: SUPABASE_DATABASE_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: borrow-service-config
                  key: SUPABASE_DATABASE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: borrow-service-secrets
                  key: JWT_SECRET
            - name: ALLOWED-ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: borrow-service-config
                  key: ALLOWED-ORIGINS
            - name: IDENTITY_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: borrow-service-config
                  key: IDENTITY_SERVICE
            - name: MAP_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: borrow-service-config
                  key: MAP_SERVICE
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: borrow-service-config
                  key: SPRING_PROFILES_ACTIVE
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8030
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8030
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: borrow-service
spec:
  selector:
    app: borrow-service
  ports:
    - protocol: TCP
      port: 8030
      targetPort: 8030
      name: http
  type: ClusterIP
