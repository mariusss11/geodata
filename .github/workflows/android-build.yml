name: Android Build

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-build.yml'
    tags:
      - 'v*'
  workflow_run:
    workflows: [ "Flutter Tests" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.11.5'
          channel: 'stable'

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Run tests (pre-build check)
        working-directory: mobile
        run: flutter test --no-pub

      - name: Extract version from pubspec
        working-directory: mobile
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d' ' -f2)
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build APK (dev)
        working-directory: mobile
        run: |
          flutter build apk \
            --dart-define=GEODATA_ENV=dev \
            --release \
            --no-tree-shake-icons

      - name: Build APK (prod)
        working-directory: mobile
        run: |
          flutter build apk \
            --dart-define=GEODATA_ENV=prod \
            --release \
            --no-tree-shake-icons \
            -o build/app/outputs/flutter-apk/app-release-prod.apk

      - name: Build App Bundle (prod)
        working-directory: mobile
        run: |
          flutter build appbundle \
            --dart-define=GEODATA_ENV=prod \
            --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: |
            mobile/build/app/outputs/flutter-apk/app-release.apk
            mobile/build/app/outputs/flutter-apk/app-release-prod.apk
          retention-days: 30

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            mobile/build/app/outputs/flutter-apk/app-release.apk
            mobile/build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          echo "## Android Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ APK (Dev): build/app/outputs/flutter-apk/app-release.apk" >> $GITHUB_STEP_SUMMARY
          echo "✅ APK (Prod): build/app/outputs/flutter-apk/app-release-prod.apk" >> $GITHUB_STEP_SUMMARY
          echo "✅ Bundle: build/app/outputs/bundle/release/app-release.aab" >> $GITHUB_STEP_SUMMARY
          echo "📦 Version: ${{ steps.version.outputs.app_version }}" >> $GITHUB_STEP_SUMMARY
