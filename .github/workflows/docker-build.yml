name: Docker Build & Push

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/docker-build.yml'
    tags:
      - 'v*'
  workflow_run:
    workflows: [ "Backend Tests" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    strategy:
      matrix:
        service: [ identity-service, map-service, borrow-service ]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.version.outputs.image }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.version.outputs.version }}

      - name: Image summary
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "📦 Service: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "🏷️ Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Image: ${{ steps.version.outputs.image }}" >> $GITHUB_STEP_SUMMARY
