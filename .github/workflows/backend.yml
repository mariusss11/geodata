name: Backend

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  test:
    name: Test, Coverage & Sonar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for SonarCloud blame and new-code period.
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with JaCoCo coverage
        working-directory: backend
        env:
          TESTCONTAINERS_CHECKS_DISABLE: 'true'
        run: mvn verify --no-transfer-progress --batch-mode

      - name: Upload JaCoCo aggregate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-aggregate-report
          path: backend/target/site/jacoco-aggregate/
          retention-days: 7

      - name: Run SonarCloud scan
        # Skip on forks where SONAR_TOKEN isn't available. Same job as the
        # tests so the freshly compiled classes in target/ are available to
        # the scanner without a separate compile step.
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            --no-transfer-progress \
            --batch-mode \
            -Dsonar.projectKey=mariusss11_geodata

  publish:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        service: [identity-service, map-service, borrow-service]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-service cache scope prevents the 3 parallel jobs from
          # overwriting each other's layer cache.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
