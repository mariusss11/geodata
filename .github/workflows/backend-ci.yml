name: Backend CI

on:
  pull_request:
    branches: [dev, main]
    paths: ['backend/**']
  push:
    branches: [dev, main]
    paths: ['backend/**']

jobs:
  test:
    name: Test & Coverage Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with JaCoCo coverage enforcement
        working-directory: backend
        env:
          # Skips Testcontainers startup self-check — Docker is pre-installed on
          # ubuntu-latest and Ryuk cleanup works correctly; no other config needed.
          TESTCONTAINERS_CHECKS_DISABLE: 'true'
        run: mvn verify --no-transfer-progress --batch-mode

      - name: Upload JaCoCo aggregate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-aggregate-report
          path: backend/target/site/jacoco-aggregate/
          retention-days: 7

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required for SonarCloud blame annotations and new-code period.
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download JaCoCo aggregate report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-aggregate-report
          path: backend/target/site/jacoco-aggregate/

      - name: Run SonarCloud scan
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            --no-transfer-progress \
            --batch-mode \
            -Dsonar.projectKey=mariusss11_geodata
