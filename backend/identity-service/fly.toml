# fly.toml app configuration file generated for geodata-idenity-service on 2026-05-04T09:47:31Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'geodata-idenity-service'
primary_region = 'ams'

[build]
  builtin = 'docker'
  dockerfile = 'identity-service/Dockerfile'

[deploy]
  strategy = 'rolling'
  release_command = 'java -jar identity-service/target/identityService.jar --spring.flyway.enabled=true'

[env]
  SPRING_PROFILES_ACTIVE = 'prod'

[http_service]
  internal_port = 8010
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = ''
  internal_port = 8010
  ports = []
  processes = ['app']

  [[services.http_checks]]
    interval = '10s'
    timeout = '5s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/actuator/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/public'
  url_prefix = '/public'
