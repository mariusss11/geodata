spring:
  application:
    name: borrow-service
  datasource:
    url: "${SUPABASE_JDBC_URL}"
    username: "${SUPABASE_DATABASE_USER}"
    password: "${SUPABASE_DATABASE_PASSWORD}"
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 20000
      max-lifetime: 300000
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: borrow
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: borrow
    default-schema: borrow
    create-schemas: true
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8030

secretsJwtString: "${JWT_SECRET}"
cors:
  allowed-origins: "${ALLOWED-ORIGINS}"

services:
  identityService: "${IDENTITY_SERVICE:localhost:8010}"
  mapService: "${MAP_SERVICE:localhost:8020}"
