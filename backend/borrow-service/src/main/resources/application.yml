spring:
  application:
    name: borrow-service

  datasource:
    url: "${SUPABASE_JDBC_URL}"
    username: "${SUPABASE_DATABASE_USER}"
    password: "${SUPABASE_DATABASE_PASSWORD}"
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 20000
      max-lifetime: 300000
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

secretsJwtString: "${JWT_SECRET}"

services:
  clientService: "${CLIENT_SERVICE:localhost:8010}"
  mapService: "${MAP_SERVICE:localhost:8020}"

cors:
  allowed-origins: "${ALLOWED_ORIGINS:http://localhost:80,http://localhost:81,http://localhost:5173}"

server:
  port: 8030