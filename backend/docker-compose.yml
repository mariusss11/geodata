name: spring-microservices-library-app
services:
  db:
    container_name: library-microservices-postgres-db
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: admin
    volumes:
      - ./sonar-init:/docker-entrypoint-initdb.d
    networks:
      - library-microservices-network
  pgAdmin4:
    image: dpage/pgadmin4
    container_name: my-pgadmin
    depends_on:
      - db
    ports:
      - "4040:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    volumes:
      - ./pgadmin4/servers.json:/pgadmin4/servers.json
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - library-microservices-network
  sonarqube:
    container_name: sonarqube-library
    image: sonarqube:latest
    depends_on:
      - db
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: true
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonarqube
      SONAR_JDBC_USERNAME: postgres
      SONAR_JDBC_PASSWORD: admin
    networks:
      - library-microservices-network



